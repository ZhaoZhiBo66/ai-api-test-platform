services:
  mysql:
    image: mysql:8.0
    container_name: ai-api-test-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: ai_test_platform
    ports:
      - "3306:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      # Over TCP on purpose, not the socket. While MySQL initialises the data
      # directory it runs a temporary server with --skip-networking, which
      # answers on the socket and would report healthy too early.
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p123456"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  app:
    build: .
    container_name: ai-api-test-platform
    depends_on:
      mysql:
        # The short "- mysql" form only waits for the container to start, not
        # for MySQL to accept connections. First boot takes tens of seconds,
        # and the lifespan handler connects immediately.
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: 123456
      DB_NAME: ai_test_platform
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: gpt-4o

